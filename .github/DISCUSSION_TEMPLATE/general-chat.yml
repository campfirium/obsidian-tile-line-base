title: "[Chat] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Use this space for open-ended discussion about TileLineBase, Obsidian, plain-text databases, and productivity workflows.
  - type: input
    id: topic
    attributes:
      label: Topic
      description: What would you like to discuss?
      placeholder: Share a question, observation, workflow thought, or comparison.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Add any background that would help others join the conversation.
    validations:
      required: false
