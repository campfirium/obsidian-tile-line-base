title: "[Q&A]: "
body:
  - type: markdown
    attributes:
      value: |
        Ask setup, workflow, and usage questions here. Please include enough context for someone to reproduce or understand your setup.
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What are you trying to do?
      placeholder: I want to use TileLineBase to...
    validations:
      required: true
  - type: textarea
    id: current-setup
    attributes:
      label: Current setup
      description: Share the relevant view, settings, sample Markdown, or steps you tried.
      placeholder: Paste a small sample or describe your setup.
    validations:
      required: false
  - type: textarea
    id: expected-result
    attributes:
      label: Expected result
      description: What result were you hoping for?
      placeholder: I expected...
    validations:
      required: false
