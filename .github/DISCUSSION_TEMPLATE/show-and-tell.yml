title: "[Show and tell]: "
body:
  - type: markdown
    attributes:
      value: |
        Share dashboards, workflows, templates, and examples built with TileLineBase.
  - type: textarea
    id: showcase
    attributes:
      label: What did you build?
      description: Describe your TileLineBase setup or workflow.
      placeholder: I built...
    validations:
      required: true
  - type: textarea
    id: how-it-works
    attributes:
      label: How it works
      description: Share the view type, structure, sample Markdown, or settings that make it work.
      placeholder: It uses...
    validations:
      required: false
  - type: textarea
    id: media
    attributes:
      label: Screenshots, links, or snippets
      description: Add images, short examples, or a demo link if you can share them.
      placeholder: Drop screenshots or snippets here.
    validations:
      required: false
